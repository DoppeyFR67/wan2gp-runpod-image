name: Build RunPod image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - runpod-start.sh
      - .dockerignore
      - .github/workflows/build-runpod.yml

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/doppeyfr67/wan2gp-runpod
  DOCKERHUB_IMAGE: doppey/wan2gp
  HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Free runner disk space
        shell: bash
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Choose image tags
        id: image-tags
        shell: bash
        run: |
          {
            echo 'tags<<EOF'
            echo "$GHCR_IMAGE:latest"
            echo "$GHCR_IMAGE:cu130"
            if [[ "$HAS_DOCKERHUB" == "true" ]]; then
              echo "$DOCKERHUB_IMAGE:latest"
              echo "$DOCKERHUB_IMAGE:cu130"
            fi
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          build-args: |
            WAN2GP_REPO=https://github.com/deepbeepmeep/Wan2GP.git
            WAN2GP_REF=main
